[workspace]
resolver = "3"
members = [
    "crates/ghostty-renderer-sys",
    "crates/ghostty-renderer",
    "crates/seance-pty",
    "crates/seance-input",
    "crates/seance-terminal",
    "crates/seance-app",
]
exclude = ["libghostty-rs"]

[workspace.package]
edition = "2024"
rust-version = "1.94"
license = "MIT OR Apache-2.0"

[workspace.lints.clippy]
collapsible_if = "warn"

[workspace.dependencies]
log = "0.4"
env_logger = "0.11"
libc = "0.2"
libghostty-vt = { path = "libghostty-rs/crates/libghostty-vt" }
