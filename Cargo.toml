[workspace]
resolver = "3"
members = [
    "crates/ghostty-renderer-sys",
    "crates/ghostty-renderer",
    "crates/seance-pty",
    "crates/seance-layout",
    "crates/seance-input",
    "crates/seance-terminal",
    "crates/seance-app",
]

[workspace.package]
edition = "2024"
rust-version = "1.94"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
log = "0.4"
env_logger = "0.11"
libc = "0.2"
libghostty-vt-sys = { git = "https://github.com/Uzaaft/libghostty-rs.git" }
